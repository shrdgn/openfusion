name: Benchmark

# Runs the self-fusion vs solo head-to-head against a live OpenRouter key.
# This spends real provider credits, so it never runs on normal pushes/PRs.
# Two ways to start it, both presetting by branch suffix:
#   1. Actions tab -> Benchmark -> Run workflow (manual dispatch, overridable).
#   2. Push a branch under run-bench/** to fire it. Branch suffix presets:
#        run-bench/smoke       -> smoke.jsonl,  dev config,        max_tokens 32 (default)
#        run-bench/sample      -> sample.jsonl, dev config,        max_tokens 32
#        run-bench/gsm8k       -> GSM8K loader, bench config,      max_tokens 512 (judge)
#        run-bench/gsm8k-vote  -> GSM8K loader, bench-vote config, max_tokens 512 (vote)
#        run-bench/research    -> research.jsonl open-ended, bench config (self-fusion), pairwise judge
#        run-bench/research-panel -> research.jsonl, diverse panel config, pairwise judge
#        run-bench/research-panelstrong -> diverse panel, but solo baseline = the strongest
#                                          member (deepseek-v4-pro): does fusion beat its best component?
#        run-bench/research-panelstrongsynth -> like panelstrong, but synthesized by a STRONG
#                                          model (deepseek-v4-pro): does a strong synthesizer beat the best member?
#        run-bench/research-paneltools -> diverse panel WITH server-side web search (panel-tools config),
#                                          web.jsonl questions, solo baseline = best member: do tools let fusion win?
#        run-bench/draco-probe -> just print the DRACO dataset schema (no model calls, ~free)
#        run-bench/draco       -> DRACO deep-research, rubric-graded solo vs fusion (draco config),
#                                 tools on both sides, solo = best member; LIMIT defaults to 10

on:
  workflow_dispatch:
    inputs:
      config:
        description: "openfusion config file"
        default: "openfusion.dev.yaml.example"
        type: string
      tasks:
        description: "JSONL task file (ignored if dataset is set)"
        default: "bench/tasks/smoke.jsonl"
        type: string
      dataset:
        description: "Public dataset loader (e.g. gsm8k); blank uses tasks"
        default: ""
        type: string
      limit:
        description: "Max tasks when using a dataset"
        default: "40"
        type: string
      max_tokens:
        description: "Per-call output cap (both solo and fusion)"
        default: "32"
        type: string
      judge_model:
        description: "Cross-family judge model for the research eval"
        default: ""
        type: string
      solo_model:
        description: "Override solo baseline model (research eval; blank = panel[0])"
        default: ""
        type: string
  push:
    branches:
      - "run-bench/**"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    # Spends real OpenRouter credits. Bind the key to a protected `bench`
    # environment so a run requires approval (and a key scoped to that
    # environment). Create it under Settings -> Environments and add a required
    # reviewer; until then GitHub auto-creates an unprotected environment.
    environment: bench
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      # Branch suffix selects the preset; workflow_dispatch inputs override.
      # 'vote' in the branch name -> vote config; 'gsm8k' -> GSM8K + bench config + 512 tokens.
      CONFIG: ${{ github.event.inputs.config || (contains(github.ref_name, 'draco') && 'openfusion.draco.yaml.example' || (contains(github.ref_name, 'vote') && 'openfusion.bench-vote.yaml.example' || (contains(github.ref_name, 'tools') && 'openfusion.panel-tools.yaml.example' || (contains(github.ref_name, 'strongsynth') && 'openfusion.panel-strongsynth.yaml.example' || (contains(github.ref_name, 'panel') && 'openfusion.panel.yaml.example' || ((contains(github.ref_name, 'gsm8k') || contains(github.ref_name, 'research')) && 'openfusion.bench.yaml.example' || 'openfusion.dev.yaml.example')))))) }}
      DATASET: ${{ github.event.inputs.dataset || (contains(github.ref_name, 'gsm8k') && 'gsm8k' || '') }}
      LIMIT: ${{ github.event.inputs.limit || (contains(github.ref_name, 'draco') && '10' || '40') }}
      TASKS: ${{ github.event.inputs.tasks || (endsWith(github.ref_name, '/sample') && 'bench/tasks/sample.jsonl' || 'bench/tasks/smoke.jsonl') }}
      MAX_TOKENS: ${{ github.event.inputs.max_tokens || (contains(github.ref_name, 'draco') && '2048' || (contains(github.ref_name, 'tools') && '1024' || ((contains(github.ref_name, 'gsm8k') || contains(github.ref_name, 'research')) && '512' || '32'))) }}
      EVAL: ${{ contains(github.ref_name, 'draco') && 'draco' || (contains(github.ref_name, 'research') && 'research' || 'accuracy') }}
      # 'draco-probe' in the branch -> just print the dataset schema, no model calls.
      PROBE: ${{ contains(github.ref_name, 'probe') && '1' || '' }}
      # Research eval task file: web-dependent questions for the tools preset,
      # otherwise the standard tool-free research set.
      RESEARCH_TASKS: ${{ contains(github.ref_name, 'tools') && 'bench/tasks/web.jsonl' || 'bench/tasks/research.jsonl' }}
      JUDGE_MODEL: ${{ github.event.inputs.judge_model || 'google/gemini-3-flash-preview' }}
      # 'panelstrong' and 'tools' override the solo baseline to the strongest panel
      # member so we ask whether fusion beats its best component (not just panel[0]).
      SOLO_MODEL: ${{ github.event.inputs.solo_model || ((contains(github.ref_name, 'panelstrong') || contains(github.ref_name, 'tools') || contains(github.ref_name, 'draco')) && 'deepseek/deepseek-v4-pro' || '') }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Verify key is configured
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY secret is not set for this repository."
            exit 1
          fi

      - name: Start openfusion
        run: |
          OPENFUSION_CONFIG="$CONFIG" \
            openfusion --host 127.0.0.1 --port 8000 > server.log 2>&1 &
          echo $! > server.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/healthz > /dev/null; then
              echo "server ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::server did not become healthy"
          cat server.log
          exit 1

      - name: Run benchmark
        run: |
          mkdir -p bench/results
          if [ "$EVAL" = "draco" ]; then
            if [ -n "$PROBE" ]; then
              echo "Probing DRACO dataset schema (no model calls)"
              python -m bench.draco --probe --limit 3
            else
              echo "Running: draco_eval with $CONFIG, judge $JUDGE_MODEL, solo ${SOLO_MODEL:-panel[0]}, limit $LIMIT"
              SOLO_ARG=""
              if [ -n "$SOLO_MODEL" ]; then SOLO_ARG="--solo-model $SOLO_MODEL"; fi
              python bench/draco_eval.py \
                --config "$CONFIG" \
                --limit "$LIMIT" \
                --judge-model "$JUDGE_MODEL" \
                $SOLO_ARG \
                --answer-tokens "$MAX_TOKENS" \
                --grading-runs 1 \
                --output bench/results/latest.json
            fi
          elif [ "$EVAL" = "research" ]; then
            SOLO_ARG=""
            if [ -n "$SOLO_MODEL" ]; then SOLO_ARG="--solo-model $SOLO_MODEL"; fi
            echo "Running: research_eval (pairwise) with $CONFIG, judge $JUDGE_MODEL, solo ${SOLO_MODEL:-panel[0]}"
            python bench/research_eval.py \
              --config "$CONFIG" \
              --tasks "$RESEARCH_TASKS" \
              --judge-model "$JUDGE_MODEL" \
              $SOLO_ARG \
              --max-tokens "$MAX_TOKENS" \
              --output bench/results/latest.json
          else
            ARGS="--config $CONFIG --max-tokens $MAX_TOKENS --output bench/results/latest.json"
            if [ -n "$DATASET" ]; then
              ARGS="$ARGS --dataset $DATASET --limit $LIMIT"
            else
              ARGS="$ARGS --tasks $TASKS"
            fi
            echo "Running: python bench/run.py $ARGS"
            python bench/run.py $ARGS
          fi

      - name: Write job summary
        if: always()
        run: |
          python - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import json
          import pathlib

          path = pathlib.Path("bench/results/latest.json")
          if not path.exists():
              print("No results produced — see the benchmark step logs.")
              raise SystemExit(0)

          report = json.loads(path.read_text())

          print("## openfusion benchmark\n")
          print(f"- Config: `{report['config']}`")
          if report.get("tasks_file"):
              print(f"- Tasks: `{report['tasks_file']}`")
          print(f"- Solo model: `{report['solo_model']}`  Fusion: `{report['fusion_model']}`")
          tok = report.get("max_tokens") or report.get("answer_tokens")
          print(f"- max_tokens: {tok}\n")

          if report.get("eval") == "draco_rubric":
              s = report["summary"]
              tools = report.get("solo_tools") or []
              tools_str = ", ".join(t.replace("openrouter:", "") for t in tools) or "none"
              def pct(v):
                  return f"{v:.1f}%" if v is not None else "n/a"
              print(f"- Judge model: `{report['judge_model']}` (rubric grading)")
              print(f"- Tools (both solo & panel): {tools_str}")
              print(f"- Grading runs: {report.get('grading_runs')}\n")
              print("| Metric | Value |")
              print("|--------|-------|")
              print(f"| Tasks scored | {s['n']} |")
              print(f"| Errors (skipped) | {s['errors']} |")
              print(f"| Solo mean score | {pct(s['solo_mean'])} |")
              print(f"| Fusion mean score | {pct(s['fusion_mean'])} |")
              print(f"| Delta (fusion - solo) | {pct(s['delta_mean'])} |")
              print(f"| Fusion better (of {s['paired_n']} paired) | {s['fusion_better']} |")
              for reason in s.get("error_sample") or []:
                  print(f"\n> error: {reason}")
              by_domain = s.get("by_domain") or {}
              if by_domain:
                  print("\n| Domain | Solo | Fusion |")
                  print("|--------|------|--------|")
                  for dom, v in by_domain.items():
                      print(f"| {dom or '(none)'} | {pct(v['solo'])} | {pct(v['fusion'])} |")
          elif report.get("eval") == "research_pairwise":
              s = report["summary"]
              rate = s["fusion_win_rate_decided"]
              rate_str = f"{rate * 100:.0f}%" if rate is not None else "n/a"
              ci = s.get("fusion_win_rate_ci95")
              ci_str = f"{ci[0] * 100:.0f}–{ci[1] * 100:.0f}%" if ci else "n/a"
              print(f"- Judge model: `{report['judge_model']}` (blind pairwise)")
              tools = report.get("solo_tools") or []
              tools_str = ", ".join(t.replace("openrouter:", "") for t in tools) or "none"
              print(f"- Tools (both solo & panel): {tools_str}\n")
              print("| Metric | Value |")
              print("|--------|-------|")
              print(f"| Questions | {s['n']} |")
              print(f"| Fusion wins | {s['fusion_wins']} |")
              print(f"| Solo wins | {s['solo_wins']} |")
              print(f"| Ties | {s['ties']} |")
              print(f"| Unparsed verdicts | {s.get('unparsed', 0)} |")
              print(f"| Errors (skipped) | {s.get('errors', 0)} |")
              print(f"| Fusion win rate (of {s['decided']} decided) | {rate_str} |")
              print(f"| 95% CI (Wilson) | {ci_str} |")
              print(f"| Solo cost | ${s['solo']['total_cost_usd']:.4f} |")
              print(f"| Fusion cost | ${s['fusion']['total_cost_usd']:.4f} |")
          else:
              def row(label, s):
                  acc = f"{s['accuracy'] * 100:.1f}% ({s['correct']}/{s['total']})"
                  cpc = s.get("cost_per_correct_usd")
                  cpc_str = f"${cpc:.5f}" if cpc is not None else "n/a"
                  return (
                      f"| {label} | {acc} | {s['avg_latency_seconds']:.2f}s "
                      f"| {s['total_tokens']} | ${s['total_cost_usd']:.4f} | {cpc_str} |"
                  )

              print("| Mode | Accuracy | Avg latency | Tokens | Cost | $/correct |")
              print("|------|----------|-------------|--------|------|-----------|")
              print(row("Solo", report["solo"]))
              print(row("Fusion", report["fusion"]))
          PY

      - name: Stop server
        if: always()
        run: |
          [ -f server.pid ] && kill "$(cat server.pid)" 2>/dev/null || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: |
            bench/results/latest.json
            server.log
          if-no-files-found: warn
