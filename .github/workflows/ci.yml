name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Pytest with coverage
        run: pytest -v --cov=openfusion --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install UI dependencies
        working-directory: web
        run: npm ci

      - name: Vitest
        working-directory: web
        run: npm test

      - name: Build UI
        working-directory: web
        run: npm run build

      - name: Check built assets are committed and in sync
        run: |
          if ! git diff --quiet -- openfusion/static/playground; then
            echo "::error::Built UI is out of sync. Run 'cd web && npm run build' and commit."
            git --no-pager diff --stat -- openfusion/static/playground
            exit 1
          fi
