name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      # Publishing only happens once a PyPI token is configured as a repo secret.
      HAS_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      # Publishes to PyPI only when a PYPI_API_TOKEN secret is set; until then
      # this step is skipped, so tagging still builds the wheel and image.
      - name: Publish to PyPI
        if: env.HAS_PYPI_TOKEN == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for the full notes.

            **Install**
            ```bash
            uvx --from git+https://github.com/${{ github.repository }} openfusion   # chat
            uv tool install git+https://github.com/${{ github.repository }}          # persistent CLI
            docker run -p 8000:8000 ghcr.io/${{ github.repository }}:${{ github.ref_name }}  # web
            ```
